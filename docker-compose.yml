services:
  gitlab-pulse:
    build:
      context: .
      dockerfile: Dockerfile
    image: gitlab-pulse:local
    ports:
      - "8501:8501" # Expose Streamlit dashboard port
    volumes:
      - ./data:/app/data # Persist data and AI chats
    env_file:
      - .env
    environment:
      # Automatically seed synthetic test data on startup if no live data exists
      - SEED_LOCAL_DATA=true
