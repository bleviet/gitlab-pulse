[server]
headless = true
# Bind to all interfaces so the app is accessible from other machines on the network
address = "0.0.0.0"
# Disable CORS for local network access during development
# WARNING: Do not use these settings in production environments
enableCORS = false
enableXsrfProtection = false

[theme]
primaryColor = "#4F46E5"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#1E293B"
font = "sans serif"
