[server]
headless = true
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false
enableStaticServing = false

[theme]
base = "light"
font = "SpaceGrotesk"
baseRadius = "0.5rem"
buttonRadius = "full"
showSidebarBorder = true
showWidgetBorder = true
headingFontWeights = [600, 500, 500, 500, 500, 500]
headingFontSizes = ["3rem", "2rem"]
codeFont = "SpaceMono"
codeFontSize = ".75rem"

[[theme.fontFaces]]
family = "SpaceGrotesk"
url = "app/static/SpaceGrotesk-VariableFont_wght.ttf"


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-Bold.ttf"
style = "normal"
weight = 700


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-BoldItalic.ttf"
style = "italic"
weight = 700


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-Italic.ttf"
style = "italic"
weight = 400


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-Regular.ttf"
style = "normal"
weight = 400

[theme.light]
primaryColor = "#ff512f"
backgroundColor = "#f8f9fc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0d1120"
borderColor = "#e2e3e5"
dataframeBorderColor = "#e2e3e5"
dataframeHeaderBackgroundColor = "#eef0f5"
linkColor = "#0079b3"
codeBackgroundColor = "#e8eaf0"
chartCategoricalColors = ["#0079b3", "#cf2c48", "#a110bd", "#059669", "#ff512f", "#dd2476", "#d97706"]

[theme.light.sidebar]
primaryColor = "#ff512f"
backgroundColor = "#eef0f5"
secondaryBackgroundColor = "#f8f9fc"
textColor = "#0d1120"
borderColor = "#e2e3e5"
dataframeBorderColor = "#e2e3e5"
dataframeHeaderBackgroundColor = "#eef0f5"

[theme.dark]
primaryColor = "#ff512f"
backgroundColor = "#050811"
secondaryBackgroundColor = "#0c1123"
textColor = "#ffffff"
borderColor = "#1e2129"
dataframeBorderColor = "#1e2129"
dataframeHeaderBackgroundColor = "#0a0f1e"
linkColor = "#4facfe"
codeBackgroundColor = "#0a0f1e"
chartCategoricalColors = ["#4facfe", "#F5576C", "#DA22FF", "#4ade80", "#ff512f", "#dd2476", "#fbbf24"]

[theme.dark.sidebar]
primaryColor = "#ff512f"
backgroundColor = "#0c1123"
secondaryBackgroundColor = "#080d1a"
textColor = "#ffffff"
borderColor = "#1e2129"
dataframeBorderColor = "#1e2129"
dataframeHeaderBackgroundColor = "#0a0f1e"
