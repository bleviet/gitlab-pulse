[server]
headless = true
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false
enableStaticServing = false

[theme]
base = "light"
font = "Manrope"
baseRadius = "0.5rem"
buttonRadius = "full"
showSidebarBorder = true
showWidgetBorder = true
headingFontWeights = [600, 500, 500, 500, 500, 500]
headingFontSizes = ["3rem", "2rem"]
codeFont = "SpaceMono"
codeFontSize = ".75rem"

[[theme.fontFaces]]
family = "Manrope"
url = "app/static/Manrope-Regular.ttf"
style = "normal"
weight = 400

[[theme.fontFaces]]
family = "Manrope"
url = "app/static/Manrope-SemiBold.ttf"
style = "normal"
weight = 600

[[theme.fontFaces]]
family = "Manrope"
url = "app/static/Manrope-Bold.ttf"
style = "normal"
weight = 700

[[theme.fontFaces]]
family = "SpaceGrotesk"
url = "app/static/SpaceGrotesk-VariableFont_wght.ttf"


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-Bold.ttf"
style = "normal"
weight = 700


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-BoldItalic.ttf"
style = "italic"
weight = 700


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-Italic.ttf"
style = "italic"
weight = 400


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-Regular.ttf"
style = "normal"
weight = 400

[theme.light]
primaryColor = "#ff512f"
backgroundColor = "#f8f9fc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0d1120"
borderColor = "#CBD5E1"
dataframeBorderColor = "#CBD5E1"
dataframeHeaderBackgroundColor = "#F1F5F9"
linkColor = "#0079b3"
codeBackgroundColor = "#e8eaf0"
chartCategoricalColors = ["#0079b3", "#cf2c48", "#a110bd", "#059669", "#ff512f", "#dd2476", "#d97706"]

[theme.light.sidebar]
primaryColor = "#ff512f"
backgroundColor = "#eef0f5"
secondaryBackgroundColor = "#f8f9fc"
textColor = "#0d1120"
borderColor = "#CBD5E1"
dataframeBorderColor = "#CBD5E1"
dataframeHeaderBackgroundColor = "#F1F5F9"

[theme.dark]
primaryColor = "#ff512f"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#111827"
textColor = "#E5E7EB"
borderColor = "#2A3447"
dataframeBorderColor = "#2A3447"
dataframeHeaderBackgroundColor = "#172033"
linkColor = "#60A5FA"
codeBackgroundColor = "#172033"
chartCategoricalColors = ["#60A5FA", "#F59E0B", "#34D399", "#F87171", "#A78BFA", "#22D3EE", "#94A3B8"]

[theme.dark.sidebar]
primaryColor = "#ff512f"
backgroundColor = "#111827"
secondaryBackgroundColor = "#0B1220"
textColor = "#E5E7EB"
borderColor = "#2A3447"
dataframeBorderColor = "#2A3447"
dataframeHeaderBackgroundColor = "#172033"

