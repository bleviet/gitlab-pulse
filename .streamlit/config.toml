[server]
headless = true
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false
enableStaticServing = false

[theme]
base = "light"
font = "SpaceGrotesk"
baseRadius = "0.5rem"
buttonRadius = "full"
showSidebarBorder = true
showWidgetBorder = true
headingFontWeights = [600, 500, 500, 500, 500, 500]
headingFontSizes = ["3rem", "2rem"]
codeFont = "SpaceMono"
codeFontSize = ".75rem"
codeBackgroundColor = "#ecebe4"
linkColor = "#3d3a2a"
chartCategoricalColors = ["#0ea5e9", "#059669", "#fbbf24"]

[[theme.fontFaces]]
family = "SpaceGrotesk"
url = "app/static/SpaceGrotesk-VariableFont_wght.ttf"


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-Bold.ttf"
style = "normal"
weight = 700


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-BoldItalic.ttf"
style = "italic"
weight = 700


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-Italic.ttf"
style = "italic"
weight = 400


[[theme.fontFaces]]
family = "SpaceMono"
url = "app/static/SpaceMono-Regular.ttf"
style = "normal"
weight = 400












[theme.light]
primaryColor = "#ff512f"
backgroundColor = "#f8f9fc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0d1120"
borderColor = "#e2e3e5"
dataframeBorderColor = "#e2e3e5"
dataframeHeaderBackgroundColor = "#eef0f5"

[theme.light.sidebar]
primaryColor = "#ff512f"
backgroundColor = "#eef0f5"
secondaryBackgroundColor = "#f8f9fc"
textColor = "#0d1120"
borderColor = "#e2e3e5"
dataframeBorderColor = "#e2e3e5"
dataframeHeaderBackgroundColor = "#eef0f5"

[theme.dark]
primaryColor = "#ff512f"
backgroundColor = "#050811"
secondaryBackgroundColor = "#0c1123"
textColor = "#ffffff"
borderColor = "#1e2129"
dataframeBorderColor = "#1e2129"
dataframeHeaderBackgroundColor = "#0a0f1e"

[theme.dark.sidebar]
primaryColor = "#ff512f"
backgroundColor = "#0c1123"
secondaryBackgroundColor = "#080d1a"
textColor = "#ffffff"
borderColor = "#1e2129"
dataframeBorderColor = "#1e2129"
dataframeHeaderBackgroundColor = "#0a0f1e"
