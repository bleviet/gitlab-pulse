# Default Domain Rules Configuration
# Place team-specific rules in separate YAML files (e.g., team_backend.yaml)

# Project mapping (required field)
project_ids:
  - 101  # Example project ID
  - 102  # Additional project
  - 103  # Additional project

# Team/Domain identifier
team: "default"

# Label mappings: GitLab labels → human-readable terms
label_mappings:
  type:
    "type::bug": "Bug"
    "type::feature": "Feature"
    "type::task": "Task"
    "type::epic": "Epic"
  severity:
    "severity::critical": "Critical"
    "severity::high": "High"
    "severity::medium": "Medium"
    "severity::low": "Low"
  priority:
    "priority::1": "P1"
    "priority::2": "P2"
    "priority::3": "P3"

# Title patterns: infer type from title when labels are missing (case-insensitive)
# Simple keyword matching - if title contains any keyword, assign that type
title_patterns:
  type:
    Bug:
      - bug
      - fix
      - error
      - crash
    Feature:
      - feature
      - enhancement
      - add
    Task:
      - task
      - refactor
      - update
      - clean

# Context Slicing: enable "Data Explosion" for sub-project tracking
# Issues with matching labels are duplicated per context for analytics
contexts:
  method: "label_prefix"
  require_assignment: false  # Set true to flag issues without context as quality failures
  patterns:
    - prefix: "rnd::"
      alias: "R&D"
    - prefix: "cust::"
      alias: "Customer"

# Validation rules
workflow:
  stages:
    - name: "Architecture"
      labels: ["workflow::architecture", "status::design"]
      type: "active"
    - name: "Implementation"
      labels: ["workflow::implementation", "status::coding"]
      type: "active"
    - name: "Review"
      labels: ["workflow::review", "status::mr_open"]
      type: "waiting"
    - name: "Testing"
      labels: ["workflow::test", "status::validation"]
      type: "active"
    - name: "Done"
      labels: ["workflow::done", "status::released"]
      type: "completed"

validation:
  # Required labels for specific issue types
  required_labels:
    Bug:
      - "severity::"  # Any severity label required for bugs
    Feature:
      - "priority::"  # Any priority label required for features

  # Required fields (column names)
  required_fields:
    Feature:
      - "milestone"  # Feature issues must have a milestone (title)


  # Staleness threshold (days since last update)
  stale_threshold_days: 30

  # Maximum allowed cycle time (days)
  max_cycle_time_days: 90

# Semantic color overrides (optional)
colors:
  Bug: "#EF4444"
  Feature: "#3B82F6"
  Task: "#10B981"
  Epic: "#8B5CF6"
