# Default Domain Rules Configuration
# Place team-specific rules in separate YAML files (e.g., team_backend.yaml)

# Project mapping (required field)
project_ids:
  # - 101  # Example project ID
  # - 102  # Additional project
  # - 103  # Additional project
  - 77793080 # Example GitLab project ID

# Team/Domain identifier
team: "default"

# Classification Rules: Categorize issues by Type, Severity, Priority
classification:
  type:
    Bug: 
      labels: ["type::bug"]
      title: ["contains:bug", "contains:fix", "contains:error", "contains:crash"]
    Feature:
      labels: ["type::feature"]
      title: ["contains:feature", "contains:enhancement", "contains:add"]
    Task:
      labels: ["type::task"]
      title: ["contains:task", "contains:refactor", "contains:update", "contains:clean"]
    Epic:
      labels: ["type::epic"]
      
  severity:
    Critical:
      labels: ["severity::critical"]
    High:
      labels: ["severity::high"]
    Medium:
      labels: ["severity::medium"]
    Low:
      labels: ["severity::low"]
      
  priority:
    P1:
      labels: ["priority::1"]
    P2:
      labels: ["priority::2"]
    P3:
      labels: ["priority::3"]

# Context rules: Categorize work into sub-projects or business domains using label patterns or title keywords
contexts:
  rules:
    - name: "ProjectA"
      labels: ["contains:project::A"]
    - name: "ProjectB"
      labels: ["contains:project::B"]
    
    # --- Examples of Context Rules ---
    #
    # 1. Regex Match (Case-Insensitive):
    # - name: "Go Lang"
    #   title: ["regex:(?i)\\bgo\\b"] 
    #
    # 2. Strict Label Match (Exact):
    # - name: "Urgent"
    #   labels: ["exact:p1-urgent", "exact:critical-incident"]
    #
    # 3. Flexible Title Keywords (Contains):
    # - name: "Database"
    #   title: ["contains:sql", "contains:postgres", "contains:database"]
    #
    # 4. Mixed Criteria (Labels OR Title):
    # - name: "Security"
    #   labels: ["contains:security", "exact:cve"]
    #   title: ["regex:(?i)vulnerability", "contains:exploit"]
    
    # - name: "iteration"
    #   labels: ["regex:^iteration-\d+$"]

# Validation rules
workflow:
  stages:
    - name: "Architecture"
      labels: ["workflow::architecture", "status::design"]
      type: "active"
      description: "Initial design and architectural decisions"
    - name: "Implementation"
      labels: ["workflow::implementation", "status::coding"]
      type: "active"
      description: "Writing code and implementing features"
    - name: "Review"
      labels: ["workflow::review", "status::mr_open"]
      type: "waiting"
      description: "Code review and merge request feedback"
    - name: "Testing"
      labels: ["workflow::test", "status::validation"]
      type: "active"
      description: "Quality assurance and testing"
    - name: "Done"
      labels: ["workflow::done", "status::released"]
      type: "completed"
      description: "Work is done and released"
    # Custom Workflow Example (Uncomment to use)
    - name: "In Progress"
      # Matches iteration labels like "iteration-42", "iteration-10"
      labels: ['regex:^iteration-\d+$']
      type: "active"
    - name: "Verification"
      # Matches dynamic verification label (e.g., iteration-42::verify)
      labels: ['regex:^iteration-\d+::verify$']
      type: "waiting"

validation:
  # Master switch — set to false to bypass all hygiene checks.
  # When false, every issue is marked valid and the Hygiene view shows no errors.
  enabled: true

  # Required labels for specific issue types
  required_labels:
    Bug:
      - "contains:severity::"  # Matches labels containing "severity::" (e.g. severity::high)
    Feature:
      - "contains:priority::"
    Task:
      - "contains:priority::"

  # Required fields (column names)
  required_fields:
    Feature:
      - "milestone"  # Feature issues must have a milestone (title)


  # Staleness threshold (days since last update)
  stale_threshold_days: 30

  # Maximum allowed cycle time (days)
  max_cycle_time_days: 90

# Semantic color overrides (optional)
# Supported formats:
# 1) Legacy shared palette (flat key/value)
# 2) Theme-aware palette with `light` and `dark` sections
colors:
  light:
    # Issue Types — aligned with node palette (light)
    bug:     "#cf2c48"   # --node-pink
    feature: "#059669"
    task:    "#0079b3"   # --node-cyan
    epic:    "#a110bd"   # --node-purple

    # Status / Flow
    active:    "#059669"
    waiting:   "#d97706"   # amber
    completed: "#a110bd"   # --node-purple
    stale:     "#cf2c48"   # --node-pink

    # General UI
    primary: "#ff512f"   # --brand
    neutral: "#5a6a82"   # --muted

    # Severity — semantic red → amber → yellow → green scale
    critical: "#dc2626"
    high:     "#ea580c"
    medium:   "#ca8a04"
    low:      "#16a34a"
    unset:    "#5a6a82"   # --muted

    # Priority
    p1: "#cf2c48"   # --node-pink
    p2: "#ca8a04"   # amber/yellow
    p3: "#16a34a"   # green

  dark:
    # Issue Types — aligned with node palette (dark)
    bug:     "#F5576C"   # --node-pink
    feature: "#4ade80"
    task:    "#4facfe"   # --node-cyan
    epic:    "#DA22FF"   # --node-purple

    # Status / Flow
    active:    "#4ade80"
    waiting:   "#e8a87c"   # warm amber
    completed: "#DA22FF"   # --node-purple
    stale:     "#F5576C"   # --node-pink

    # General UI
    primary: "#ff512f"   # --brand
    neutral: "#8a9bb2"   # --muted

    # Severity — semantic red → amber → yellow → green scale
    critical: "#f87171"
    high:     "#fb923c"
    medium:   "#fbbf24"
    low:      "#4ade80"
    unset:    "#8a9bb2"   # --muted

    # Priority
    p1: "#dd2476"   # --brand-2
    p2: "#fbbf24"   # yellow
    p3: "#4ade80"   # green

# Capacity View Configuration
capacity:
  max_wip_per_person: 5
  max_contexts_per_person: 2
  anonymize_users: false
  hidden_users: []
